name: Deploy Landing

on:
  push:
    branches: [master]
    paths:
      - 'src/landing/**'

jobs:
  deploy-landing:
    name: Deploy Landing to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: src/landing

      - run: npm run build
        working-directory: src/landing

      - run: npx wrangler pages deploy dist --project-name=reelballers-landing
        working-directory: src/landing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

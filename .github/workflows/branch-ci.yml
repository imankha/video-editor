name: Branch CI

# Independent verification of every feature branch: converts "the worker says
# tests pass" into "GitHub says tests pass". Runs unit tests + changed-file
# lint on both layers. Known pre-existing failures are catalogued in
# docs/testing/known-failures.md -- keep the deselect list below in sync.

on:
  push:
    branches: ['feature/**']
  workflow_dispatch:

concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: ESLint (changed files vs master)
        run: |
          git fetch origin master --quiet
          CHANGED=$(git diff --name-only origin/master...HEAD -- 'src/frontend/**/*.js' 'src/frontend/**/*.jsx' | sed 's|^src/frontend/||')
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED" | xargs npx eslint --no-warn-ignored
          else
            echo "no changed frontend JS files"
          fi
      - name: ESLint regression gate (whole src must not regrow the backlog)
        # T4790: froze the eslint backlog at 0 errors / 1019 warnings. Any new
        # error, or warnings past the baseline, fails the branch. Ratchet these
        # numbers DOWN as the warning backlog is cleared; never up.
        # T5030: ratcheted down to 998 (burned React imports + dead local vars).
        run: npx eslint src --max-warnings 998
      - name: Unit tests (vitest, retry absorbs known flakes)
        run: npx vitest run --retry=2

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # pg_conn fixture creates schema + runs migrations itself on this
      # disposable DB, and its staging/prod DSN guard passes ("ci_test").
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      APP_ENV: dev
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/backend/requirements*.txt
      - name: Install ffmpeg (metadata tests use ffprobe)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Install deps
        # T5020: starlette 0.37.2 dropped the httpx-removed `app=` TestClient kwarg,
        # so tests run on the SAME httpx 0.28.1 as prod -- no `httpx<0.28` override.
        run: pip install -r requirements.prod.txt -r requirements.test.txt ruff
      - name: Ruff (changed files vs master)
        run: |
          git fetch origin master --quiet
          CHANGED=$(git diff --name-only origin/master...HEAD -- 'src/backend/**/*.py' | sed 's|^src/backend/||')
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED" | xargs ruff check
          else
            echo "no changed backend py files"
          fi
      - name: Ruff regression gate (whole app must not regrow the backlog)
        # T4790: froze the ruff backlog at 261 errors (all remaining are
        # unsafe-autofix or manual-only rules; see the T4790 report). Fail if the
        # count grows. Ratchet the baseline DOWN as the remainder is cleared.
        # T5020: ratcheted to 239. NOTE: 5 SIM118 warnings in clips.py,
        # overlay.py, games_upload.py are kept as x.keys() -- ruff's suggested
        # rewrite is a bug for sqlite3.Row (in row checks VALUES, not column
        # names). See tests/test_sqlite_row_membership.py for proof.
        run: |
          OUT=$(ruff check app --output-format=concise || true)
          COUNT=$(printf '%s\n' "$OUT" | grep -c '^app/' || true)
          echo "ruff error count: $COUNT (baseline 239)"
          if [ "$COUNT" -gt 239 ]; then
            echo "::error::ruff errors grew past the T5020 baseline of 239 (now $COUNT). Fix the new errors or lower the baseline only if you reduced the backlog."
            exit 1
          fi
      - name: Import check
        run: python -c "from app.main import app"
      - name: Pytest (deselects = docs/testing/known-failures.md)
        # selection mirrors run_tests.py (canonical suite); tests/integration is not part of it; pytest tests/ hits a capture-closing internal error - root-cause tracked in T5000
        run: >-
          python -m pytest tests/test_*.py --tb=short --capture=sys
          --deselect tests/test_shared_game_extension.py::TestStorageStatusDerivation

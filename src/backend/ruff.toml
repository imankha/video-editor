# Ruff configuration for video-editor backend
target-version = "py311"
line-length = 120

[lint]
# Enable common rule sets
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (import sorting)
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "UP",    # pyupgrade
    "RUF",   # Ruff-specific rules
]

ignore = [
    "E501",   # Line too long (handled by formatter)
    "B008",   # Do not perform function call in argument defaults (common in FastAPI)
    "B905",   # `zip()` without `strict=` (too noisy)
    "SIM108", # Use ternary operator (readability preference)
    "SIM105", # contextlib.suppress (readability preference; same rationale as SIM108)
    "UP007",  # Use X | Y for union types (keep Optional for clarity)
    "UP042",  # str+Enum -> StrEnum: `str, Enum` is the documented pattern (see backend type-safety skill)
    "RUF012", # Mutable class variables (false positives with SQLAlchemy/Pydantic)
]

# Exclude auto-generated and third-party code
exclude = [
    ".venv",
    "__pycache__",
    "*.pyc",
    "migrations",
    "alembic",
]

[lint.per-file-ignores]
# Tests can use assert, magic values, etc.
"tests/**/*.py" = ["B011", "S101"]
# Modal functions have different patterns
"app/modal_functions/**/*.py" = ["E402"]
# main.py intentionally orders imports after logging config + conditional/deferred
# imports for app init (same import-after-code pattern as modal functions).
"app/main.py" = ["E402"]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"

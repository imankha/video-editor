[pytest]
markers =
    local_disk_timing: wall-clock timing asserts that only hold on container-local/native disk; runs on the /workspace Windows bind mount deselect via -m "not local_disk_timing" (see test_session_init_recovery.py).

# T5060: regression guard -- keep the deprecation classes surfaced by the
# starlette 0.37.2 / fastapi 0.110.1 bump (T5020) cleared and at zero. Scoped to
# the EXACT messages so unrelated third-party DeprecationWarnings are NOT
# escalated to errors (rule: do not globally error all DeprecationWarnings).
#   1. fastapi @app.on_event(...)          -> converted to lifespan= in main.py
#   2. starlette TestClient per-request cookies= -> set on the client instance
# The httpx "Client(app=...)" shortcut is not listed: on the pinned httpx
# 0.28.1 that kwarg was REMOVED (hard TypeError, not a warning), and every test
# already drives the app via httpx.ASGITransport(app=...), so there is no live
# httpx DeprecationWarning to guard.
filterwarnings =
    error:(?s).*on_event is deprecated:DeprecationWarning
    error:Setting per-request cookies:DeprecationWarning

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Reel Ballers</title>
    <meta name="description" content="Turn game film into highlight reels. Clip, spotlight, and share your player's best plays in minutes." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Reel Ballers" />
    <meta property="og:title" content="Reel Ballers" />
    <meta property="og:description" content="Turn game film into highlight reels. Clip, spotlight, and share your player's best plays in minutes." />
    <meta property="og:image" content="https://app.reelballers.com/og-card.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reel Ballers" />
    <meta name="twitter:description" content="Turn game film into highlight reels. Clip, spotlight, and share your player's best plays in minutes." />
    <meta name="twitter:image" content="https://app.reelballers.com/og-card.jpg" />
    <link rel="preconnect" href="https://app.reelballers.com" crossorigin>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      if (location.hostname !== 'localhost') {
        fetch('/storage/warmup', {credentials: 'omit'}).catch(function(){});
      }
    </script>
    <style>
      /* Preloader — shown instantly, hidden by App.jsx when ready */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        transition: opacity 0.3s ease-out;
      }
      #preloader.fade-out { opacity: 0; pointer-events: none; }
      #preloader svg { animation: preloader-spin 2s linear infinite; }
      @keyframes preloader-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      /* Progress bar container */
      #preloader-progress {
        width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #preloader-bar {
        width: 100%;
        height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #preloader-bar-fill {
        height: 100%;
        width: 5%;
        background: linear-gradient(90deg, #a855f7, #6366f1);
        border-radius: 2px;
        transition: width 0.4s ease-out;
      }
      #preloader-status {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Preloader: fixed overlay, removed by app when session init completes -->
    <div id="preloader">
      <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" stroke="url(#g)" stroke-width="3" fill="none" />
        <circle cx="24" cy="4" r="2" fill="#a855f7" />
        <circle cx="24" cy="44" r="2" fill="#a855f7" />
        <circle cx="4" cy="24" r="2" fill="#a855f7" />
        <circle cx="44" cy="24" r="2" fill="#a855f7" />
        <path d="M20 16 L20 32 L34 24 Z" fill="white" opacity="0.95" />
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
        </defs>
      </svg>
      <div id="preloader-progress">
        <div id="preloader-bar"><div id="preloader-bar-fill"></div></div>
        <div id="preloader-status">Connecting to server...</div>
      </div>
    </div>
    <script>
      // Global preloader update function — called from sessionInit.js and App.jsx
      window.__preloaderUpdate = function(percent, message) {
        var fill = document.getElementById('preloader-bar-fill');
        var status = document.getElementById('preloader-status');
        if (fill) fill.style.width = percent + '%';
        if (status) status.textContent = message;
      };

      // Capture PWA install prompt before React mounts (prevents race condition)
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
      });

      // Unsupported browser detection — runs before React loads.
      // IE lacks ES module support so <script type="module"> won't even execute.
      // This catches IE and other legacy browsers early with a helpful message.
      (function() {
        var isIE = /*@cc_on!@*/false || !!document.documentMode;
        var hasModules = 'noModule' in HTMLScriptElement.prototype;
        if (isIE || !hasModules) {
          var preloader = document.getElementById('preloader');
          if (preloader) {
            var status = document.getElementById('preloader-status');
            if (status) {
              status.innerHTML = '<strong style="color:#f87171">Your browser is not supported.</strong><br>' +
                '<span style="margin-top:8px;display:inline-block">' +
                'Please use a modern browser like Chrome, Firefox, Safari, or Edge.</span>';
            }
            var bar = document.getElementById('preloader-bar');
            if (bar) bar.style.display = 'none';
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

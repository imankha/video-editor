<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reel Ballers</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      /* Preloader — shown instantly, hidden by App.jsx when ready */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        transition: opacity 0.3s ease-out;
      }
      #preloader.fade-out { opacity: 0; pointer-events: none; }
      #preloader svg { animation: preloader-spin 2s linear infinite; }
      @keyframes preloader-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      /* Progress bar container */
      #preloader-progress {
        width: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #preloader-bar {
        width: 100%;
        height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #preloader-bar-fill {
        height: 100%;
        width: 5%;
        background: linear-gradient(90deg, #a855f7, #6366f1);
        border-radius: 2px;
        transition: width 0.4s ease-out;
      }
      #preloader-status {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Preloader: fixed overlay, removed by app when session init completes -->
    <div id="preloader">
      <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" stroke="url(#g)" stroke-width="3" fill="none" />
        <circle cx="24" cy="4" r="2" fill="#a855f7" />
        <circle cx="24" cy="44" r="2" fill="#a855f7" />
        <circle cx="4" cy="24" r="2" fill="#a855f7" />
        <circle cx="44" cy="24" r="2" fill="#a855f7" />
        <path d="M20 16 L20 32 L34 24 Z" fill="white" opacity="0.95" />
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
        </defs>
      </svg>
      <div id="preloader-progress">
        <div id="preloader-bar"><div id="preloader-bar-fill"></div></div>
        <div id="preloader-status">Connecting to server...</div>
      </div>
    </div>
    <script>
      // Global preloader update function — called from sessionInit.js and App.jsx
      window.__preloaderUpdate = function(percent, message) {
        var fill = document.getElementById('preloader-bar-fill');
        var status = document.getElementById('preloader-status');
        if (fill) fill.style.width = percent + '%';
        if (status) status.textContent = message;
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

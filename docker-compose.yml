services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: reel-ballers-postgres-dev
    environment:
      POSTGRES_USER: reelballers
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: reelballers_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

volumes:
  pgdata-dev:
